<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Singles MV</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600&family=IBM+Plex+Sans:wght@400;500;600&family=IBM+Plex+Mono:wght@500&display=swap');
  :root{
    --bg:#0A1F1C; --surface:#102A26; --surfaceAlt:#15332E; --red:#C8313A;
    --green:#1C7A3E; --text:#F2EFE6; --muted:#8FA39E; --danger:#E0973B; --line:#1E3D37; --greenLight:#4FB876;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;background:#04100E;font-family:'IBM Plex Sans',sans-serif;color:var(--text);}
  button,input,textarea{font-family:inherit;}
  #backdrop{position:fixed;inset:0;background:radial-gradient(circle at 30% 15%, #123832 0%, #04100E 65%);z-index:-1;}
  #frame{min-height:100vh;display:flex;justify-content:center;}
  #app{width:100%;max-width:430px;height:100vh;background:var(--bg);position:relative;overflow:hidden;}
  @media (min-width:700px){
    #frame{align-items:center;padding:40px 0;}
    #app{height:844px;border-radius:36px;box-shadow:0 30px 80px rgba(0,0,0,0.55);border:1px solid var(--line);}
  }
  .screen{position:absolute;inset:0;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:24px 16px 24px;}
  .screen.with-nav{padding-bottom:96px;}
  .row{display:flex;align-items:center;}
  .between{justify-content:space-between;}
  .center{justify-content:center;}
  .col{display:flex;flex-direction:column;}
  .gap2{gap:8px;} .gap3{gap:12px;}
  .muted{color:var(--muted);}
  .serif{font-family:'Fraunces',serif;font-weight:600;}
  .mono{font-family:'IBM Plex Mono',monospace;}
  h1.title{font-family:'Fraunces',serif;font-weight:600;font-size:22px;margin:0;}
  .label{font-size:12px;letter-spacing:.04em;color:var(--muted);text-transform:uppercase;margin-bottom:8px;}
  .card{background:var(--surface);border:1px solid var(--line);border-radius:18px;padding:16px;}
  .field{width:100%;padding:10px 12px;border-radius:10px;background:var(--surface);border:1px solid var(--line);color:var(--text);font-size:14px;margin-bottom:16px;}
  .field:focus,button:focus-visible{outline:2px solid var(--greenLight);outline-offset:2px;}
  textarea.field{resize:vertical;}
  .btn{display:block;width:100%;padding:13px;border-radius:12px;border:none;font-weight:600;font-size:14px;background:var(--red);color:var(--text);cursor:pointer;}
  .btn:disabled{opacity:.5;cursor:default;}
  .btn-ghost{background:var(--surfaceAlt);color:var(--text);border:1px solid var(--line);}
  .pill{padding:6px 12px;border-radius:999px;font-size:12px;font-weight:500;border:1px solid var(--line);background:var(--surface);color:var(--muted);cursor:pointer;}
  .pill.active{background:var(--red);color:var(--text);border-color:var(--red);}
  .pill-group{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:16px;}
  .tagpill{padding:5px 10px;border-radius:999px;font-size:11px;font-weight:500;display:inline-flex;align-items:center;gap:4px;}
  .tag-green{background:rgba(28,122,62,.18);color:#4FB876;}
  .tag-red{background:rgba(200,49,58,.18);color:var(--red);}
  .tag-muted{background:var(--surfaceAlt);color:var(--muted);}
  .avatar{border-radius:999px;display:flex;align-items:center;justify-content:center;font-weight:700;color:var(--text);flex-shrink:0;position:relative;background-size:cover;background-position:center;}
  .lock-badge{position:absolute;bottom:-2px;right:-2px;background:var(--surface);border:1px solid var(--line);border-radius:999px;display:flex;align-items:center;justify-content:center;}
  .nav{position:absolute;left:0;right:0;bottom:0;display:flex;background:var(--surface);border-top:1px solid var(--line);z-index:5;}
  .nav button{flex:1;background:none;border:none;display:flex;flex-direction:column;align-items:center;gap:4px;padding:10px 0;cursor:pointer;color:var(--muted);font-size:11px;}
  .nav button.active{color:var(--red);}
  .modal-backdrop{position:absolute;inset:0;background:rgba(0,0,0,.55);display:flex;align-items:flex-end;z-index:20;}
  .modal-sheet{width:100%;max-height:86%;overflow-y:auto;background:var(--bg);border-radius:24px 24px 0 0;padding:16px;}
  .chat-screen{position:absolute;inset:0;display:flex;flex-direction:column;}
  .chat-messages{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:8px;}
  .bubble{padding:8px 12px;border-radius:16px;font-size:14px;max-width:75%;}
  .bubble.me{align-self:flex-end;background:var(--red);color:var(--text);}
  .bubble.them{align-self:flex-start;background:var(--surface);color:var(--text);}
  .chat-input-row{display:flex;gap:8px;padding:12px 16px 16px;}
  .chat-input-row input{flex:1;}
  .icon-btn{background:var(--red);border:none;border-radius:10px;width:46px;display:flex;align-items:center;justify-content:center;cursor:pointer;}
  a.btn-link{text-decoration:none;}
  .toast{position:absolute;top:16px;left:50%;transform:translateX(-50%);background:var(--green);color:var(--text);padding:8px 16px;border-radius:999px;font-size:13px;font-weight:600;z-index:30;}
</style>
</head>
<body>
<div id="backdrop"></div>
<div id="frame"><div id="app"></div></div>

<script>
/* ---------------------------------------------------------------- icons */
const ICONS = {
  heart:(s=20,c='currentColor')=>`<svg width="${s}" height="${s}" viewBox="0 0 24 24" fill="none" stroke="${c}" stroke-width="2" stroke-linecap="round"><path d="M12 20 C6 15 3 11 3 7.5 C3 4.5 5.5 3 8 4.2 C9.5 5 11 6.5 12 8.5 C13 6.5 14.5 5 16 4.2 C18.5 3 21 4.5 21 7.5 C21 11 18 15 12 20 Z"/></svg>`,
  message:(s=20,c='currentColor')=>`<svg width="${s}" height="${s}" viewBox="0 0 24 24" fill="none" stroke="${c}" stroke-width="2" stroke-linecap="round"><path d="M21 11.5a8.4 8.4 0 0 1-8.4 8.4 8.9 8.9 0 0 1-3.8-.8L3 21l1.9-5.7A8.4 8.4 0 1 1 21 11.5Z"/></svg>`,
  wallet:(s=20,c='currentColor')=>`<svg width="${s}" height="${s}" viewBox="0 0 24 24" fill="none" stroke="${c}" stroke-width="2" stroke-linecap="round"><rect x="3" y="6" width="18" height="13" rx="2"/><path d="M3 10h18"/><circle cx="16" cy="14" r="1.2" fill="${c}" stroke="none"/></svg>`,
  user:(s=20,c='currentColor')=>`<svg width="${s}" height="${s}" viewBox="0 0 24 24" fill="none" stroke="${c}" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.5-6 8-6s8 2 8 6"/></svg>`,
  lock:(s=14,c='currentColor')=>`<svg width="${s}" height="${s}" viewBox="0 0 24 24" fill="none" stroke="${c}" stroke-width="2" stroke-linecap="round"><rect x="5" y="11" width="14" height="9" rx="2"/><path d="M8 11V7a4 4 0 0 1 8 0v4"/></svg>`,
  check:(s=16,c='currentColor')=>`<svg width="${s}" height="${s}" viewBox="0 0 24 24" fill="none" stroke="${c}" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M4 12l5 5L20 6"/></svg>`,
  chevron:(s=20,c='currentColor')=>`<svg width="${s}" height="${s}" viewBox="0 0 24 24" fill="none" stroke="${c}" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 18l-6-6 6-6"/></svg>`,
  x:(s=20,c='currentColor')=>`<svg width="${s}" height="${s}" viewBox="0 0 24 24" fill="none" stroke="${c}" stroke-width="2" stroke-linecap="round"><path d="M6 6l12 12M18 6L6 18"/></svg>`,
  send:(s=18,c='currentColor')=>`<svg width="${s}" height="${s}" viewBox="0 0 24 24" fill="none" stroke="${c}" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 2 11 13"/><path d="M22 2 15 22l-4-9-9-4 20-7Z"/></svg>`,
  copy:(s=18,c='currentColor')=>`<svg width="${s}" height="${s}" viewBox="0 0 24 24" fill="none" stroke="${c}" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="12" height="12" rx="2"/><path d="M5 15V5a2 2 0 0 1 2-2h10"/></svg>`,
  upload:(s=16,c='currentColor')=>`<svg width="${s}" height="${s}" viewBox="0 0 24 24" fill="none" stroke="${c}" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 16V4M7 9l5-5 5 5"/><path d="M4 17v2a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-2"/></svg>`,
  clock:(s=22,c='currentColor')=>`<svg width="${s}" height="${s}" viewBox="0 0 24 24" fill="none" stroke="${c}" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 3"/></svg>`,
  alert:(s=14,c='currentColor')=>`<svg width="${s}" height="${s}" viewBox="0 0 24 24" fill="none" stroke="${c}" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3 2 21h20Z"/><path d="M12 10v4M12 17h.01"/></svg>`,
  mappin:(s=12,c='currentColor')=>`<svg width="${s}" height="${s}" viewBox="0 0 24 24" fill="none" stroke="${c}" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 21s7-6.5 7-12a7 7 0 1 0-14 0c0 5.5 7 12 7 12Z"/><circle cx="12" cy="9" r="2.4"/></svg>`,
  briefcase:(s=14,c='currentColor')=>`<svg width="${s}" height="${s}" viewBox="0 0 24 24" fill="none" stroke="${c}" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="7" width="18" height="13" rx="2"/><path d="M8 7V5a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>`,
  phone:(s=15,c='currentColor')=>`<svg width="${s}" height="${s}" viewBox="0 0 24 24" fill="none" stroke="${c}" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 4h4l2 5-2.5 2a12 12 0 0 0 5.5 5.5l2-2.5 5 2v4a2 2 0 0 1-2 2C9.5 22 2 14.5 2 6a2 2 0 0 1 2-2Z"/></svg>`,
  camera:(s=14,c='currentColor')=>`<svg width="${s}" height="${s}" viewBox="0 0 24 24" fill="none" stroke="${c}" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 8h3l2-3h6l2 3h3a1 1 0 0 1 1 1v10a1 1 0 0 1-1 1H4a1 1 0 0 1-1-1V9a1 1 0 0 1 1-1Z"/><circle cx="12" cy="13" r="3.5"/></svg>`,
};
function logoSVG(size=40){
  return `<svg width="${size}" height="${size}" viewBox="0 0 64 64" fill="none">
    <rect width="64" height="64" rx="16" fill="var(--surface)"/>
    <path d="M32,49 C19,40 11,30 11,20 C11,11 19,6 26,10 C29,12 31,16 32,19 C33,16 35,12 38,10 C45,6 53,11 53,20 C53,30 45,40 32,49 Z" fill="var(--red)"/>
    <rect x="19" y="23" width="26" height="15" rx="3" fill="var(--green)"/>
    <circle cx="34.5" cy="30.5" r="5.4" fill="#FFFFFF"/>
    <circle cx="36.6" cy="29" r="4.4" fill="var(--green)"/>
  </svg>`;
}
function wordmark(size=22){
  return `<span style="font-family:'Fraunces',serif;font-weight:600;font-size:${size}px;">Singles <span style="color:var(--red)">MV</span></span>`;
}

/* ---------------------------------------------------------------- data */
const PALETTE = ['var(--red)','var(--green)','#5C7AA0','#8FA39E'];
let USERS = [
  { id:1, name:"Aishath", age:26, island:"Malé", work:"Teacher", status:"Single", intent:"Serious",
    bio:"Quiet evenings, good food, and someone who follows through on plans.",
    lifestyle:{smoke:"No",drink:"No",party:"No"}, unlocked:false, color:PALETTE[0], messages:[] },
  { id:2, name:"Ibrahim", age:29, island:"Hulhumalé", work:"Marine Engineer", status:"Single", intent:"Dating",
    bio:"Out on the water most weekends. Looking for someone to drag along.",
    lifestyle:{smoke:"No",drink:"Prefer not to say",party:"No"}, unlocked:true, color:PALETTE[1],
    messages:[{from:"them",text:"Hey! Saw you're into diving too 🤿"},{from:"me",text:"Yes! Are you based in Malé?"},{from:"them",text:"Hulhumalé side, but happy to meet halfway"}] },
  { id:3, name:"Fathimath", age:24, island:"Addu City", work:"Nurse", status:"Divorced", intent:"Casual",
    bio:"Just moved back from Malé. Taking things slow and easy.",
    lifestyle:{smoke:"No",drink:"No",party:"No"}, unlocked:false, color:PALETTE[2], messages:[] },
  { id:4, name:"Hassan", age:31, island:"Malé", work:"Business owner", status:"Single", intent:"Marriage-minded",
    bio:"Ready to settle down. Family means everything to me.",
    lifestyle:{smoke:"No",drink:"No",party:"No"}, unlocked:false, color:PALETTE[3], messages:[] },
];
const LIFESTYLE_FIELDS = [
  {key:"smoke", label:"Smokes"},
  {key:"drink", label:"Drinks alcohol"},
  {key:"party", label:"Parties / substances"},
];
const INTENT_OPTIONS = ["Casual","Dating","Serious","Marriage-minded"];
const STATUS_OPTIONS = ["Single","Divorced","Widowed","Separated"];
const ANSWER_OPTIONS = ["Yes","No","Prefer not to say"];
const TOKEN_PACKS = [
  {id:"t50", label:"Starter", mvr:50, tokens:100},
  {id:"t100", label:"Basic", mvr:100, tokens:200},
  {id:"t200", label:"Plus", mvr:200, tokens:400},
  {id:"t500", label:"Power", mvr:500, tokens:1000},
];
const SUB_TIERS = [
  {id:"s300", label:"Unlimited", mvr:300, period:true, desc:"Unlimited chat unlocks"},
  {id:"s500", label:"Unlimited+", mvr:500, period:true, desc:"+ super-likes, who-liked-you, 2 boosts/mo"},
];
const BANK = {bankName:"Bank of Maldives (BML)", accountName:"[Your Business Name]", accountNumber:"0000 0000 0000"};
function genRef(){
  return "MV-" + Date.now().toString(36).toUpperCase().slice(-4) + Math.random().toString(36).toUpperCase().slice(2,5);
}

/* ---------------------------------------------------------------- state */
let state = {
  phase:"splash", tab:"discover",
  activeProfileId:null, activeChatId:null,
  checkout:{open:false, step:"select", tab:"tokens", plan:null, ref:""},
  me:{ name:"", age:"", island:"", work:"", bio:"", gender:"Woman", lookingFor:"Men",
       status:"Single", intent:"Dating", lifestyle:{smoke:"No",drink:"No",party:"No"},
       photoData:null, tokenBalance:30, subscription:"none" },
};

/* ---------------------------------------------------------------- helpers */
function avatarHTML(name, color, size, photoData){
  const style = photoData
    ? `width:${size}px;height:${size}px;background-image:url(${photoData})`
    : `width:${size}px;height:${size}px;background:${color}`;
  return `<div class="avatar" style="${style};font-size:${size*0.4}px">${photoData?'':(name[0]||'?')}</div>`;
}
function pillGroup(group, options, value){
  return `<div class="pill-group" data-group="${group}" data-value="${value}">
    ${options.map(o=>`<button type="button" class="pill ${o===value?'active':''}" onclick="selectPill(this,'${o}')">${o}</button>`).join('')}
  </div>`;
}
function selectPill(btn, value){
  const group = btn.closest('.pill-group');
  group.dataset.value = value;
  group.querySelectorAll('.pill').forEach(p=>p.classList.remove('active'));
  btn.classList.add('active');
}
function readProfileForm(){
  const get = id => (document.getElementById(id)||{}).value || "";
  const groupVal = g => { const el=document.querySelector(`.pill-group[data-group="${g}"]`); return el?el.dataset.value:""; };
  return {
    name:get('f-name'), age:get('f-age'), island:get('f-island'), work:get('f-work'), bio:get('f-bio'),
    gender:groupVal('gender'), lookingFor:groupVal('lookingFor'), status:groupVal('status'), intent:groupVal('intent'),
    lifestyle:{ smoke:groupVal('lifestyle-smoke'), drink:groupVal('lifestyle-drink'), party:groupVal('lifestyle-party') },
  };
}
function showToast(msg){
  const app = document.getElementById('app');
  const t = document.createElement('div');
  t.className='toast'; t.textContent=msg;
  app.appendChild(t);
  setTimeout(()=>t.remove(), 1400);
}
function copyField(value, btn){
  navigator.clipboard?.writeText(value).catch(()=>{});
  const icon = btn.querySelector('.copy-icon');
  if(icon){ icon.innerHTML = ICONS.check(18,'var(--greenLight)'); setTimeout(()=>{ icon.innerHTML = ICONS.copy(18,'var(--muted)'); }, 1400); }
}

/* ---------------------------------------------------------------- render dispatch */
function render(){
  const app = document.getElementById('app');
  if(state.phase==="splash"){ app.innerHTML = renderSplash(); return; }
  if(state.phase==="onboarding"){ app.innerHTML = renderProfileForm({title:"Tell us about yourself", cta:"Start exploring", mode:"onboarding"}); return; }
  if(state.activeChatId){ app.innerHTML = renderChatThread(state.activeChatId); return; }

  let body = "";
  if(state.tab==="discover") body = renderDiscover();
  else if(state.tab==="chats") body = renderChats();
  else if(state.tab==="wallet") body = state.checkout.open ? renderCheckout() : renderWallet();
  else if(state.tab==="profile") body = renderProfileForm({title:"Your profile", cta:"Save changes", mode:"edit"});

  app.innerHTML = body + renderNav();
  if(state.activeProfileId) app.innerHTML += renderProfileSheet(state.activeProfileId);
}

/* ---------------------------------------------------------------- splash */
function renderSplash(){
  return `<div class="screen col center" style="align-items:center;text-align:center;">
    ${logoSVG(88)}
    <div style="margin-top:20px">${wordmark(28)}</div>
    <p class="muted" style="margin:8px 0 0;font-size:14px;">Made for the Maldives</p>
    <div class="tagpill tag-red" style="margin-top:16px;">Sign up free — get 30 tokens, enough to unlock your first chat</div>
    <div style="width:100%;max-width:260px;margin-top:32px;">
      <button class="btn" onclick="state.phase='onboarding';render()">Get started</button>
    </div>
  </div>`;
}

/* ---------------------------------------------------------------- profile form (onboarding + edit) */
function renderProfileForm({title, cta, mode}){
  const me = state.me;
  return `<div class="screen ${mode==='edit'?'with-nav':''}">
    <div class="row between" style="margin-bottom:20px;">
      <h1 class="title">${title}</h1>
      ${logoSVG(28)}
    </div>

    <div class="col" style="align-items:center;margin-bottom:24px;">
      <div style="position:relative;cursor:pointer;" onclick="document.getElementById('f-photo').click()">
        ${avatarHTML(me.name||'?', 'var(--red)', 88, me.photoData)}
        <div style="position:absolute;bottom:-2px;right:-2px;background:var(--green);border-radius:999px;padding:6px;display:flex;">
          ${ICONS.camera(14,'var(--text)')}
        </div>
      </div>
      <input type="file" id="f-photo" accept="image/*" style="display:none" onchange="handlePhoto(event)">
      <span class="muted" style="font-size:12px;margin-top:8px;">Tap to add a photo</span>
    </div>

    <div class="label">Nickname</div>
    <input id="f-name" class="field" placeholder="What should people call you?" value="${me.name}">

    <div class="row gap3" style="margin-bottom:0;">
      <div style="flex:1;">
        <div class="label">Age</div>
        <input id="f-age" type="number" class="field" value="${me.age}">
      </div>
      <div style="flex:1;">
        <div class="label">Island</div>
        <input id="f-island" class="field" value="${me.island}">
      </div>
    </div>

    <div class="label">Gender</div>
    ${pillGroup('gender', ['Woman','Man'], me.gender)}

    <div class="label">Looking for</div>
    ${pillGroup('lookingFor', ['Women','Men','Everyone'], me.lookingFor)}

    <div class="label">Relationship status</div>
    ${pillGroup('status', STATUS_OPTIONS, me.status)}

    <div class="label">Looking to find</div>
    ${pillGroup('intent', INTENT_OPTIONS, me.intent)}

    <div class="label">Work</div>
    <input id="f-work" class="field" value="${me.work}">

    <div class="label">Bio</div>
    <textarea id="f-bio" class="field" rows="3">${me.bio}</textarea>

    <div class="label">About — smoking, drinking, going out</div>
    <div class="col gap3" style="margin-bottom:24px;">
      ${LIFESTYLE_FIELDS.map(f=>`
        <div>
          <div style="font-size:14px;margin-bottom:6px;">${f.label}</div>
          ${pillGroup('lifestyle-'+f.key, ANSWER_OPTIONS, me.lifestyle[f.key])}
        </div>
      `).join('')}
    </div>

    <button class="btn" onclick="${mode==='onboarding' ? 'finishOnboarding()' : 'saveProfile()'}">${cta}</button>
  </div>`;
}
function handlePhoto(e){
  const file = e.target.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = () => {
    state.me.photoData = reader.result;
    render();
  };
  reader.readAsDataURL(file);
}
function finishOnboarding(){
  state.me = {...state.me, ...readProfileForm()};
  state.phase = "app"; state.tab = "discover";
  render();
}
function saveProfile(){
  state.me = {...state.me, ...readProfileForm()};
  render();
  showToast("Saved ✓");
}

/* ---------------------------------------------------------------- discover */
function renderDiscover(){
  return `<div class="screen with-nav">
    <div class="row between"><h1 class="title">Discover</h1>${logoSVG(28)}</div>
    <div class="muted" style="font-size:12px;margin:4px 0 16px;">${state.me.tokenBalance} tokens available</div>
    <div class="col gap3">
      ${USERS.map(u=>`
        <button class="card row gap3" style="width:100%;text-align:left;cursor:pointer;" onclick="openProfile(${u.id})">
          ${avatarHTML(u.name,u.color,52)}
          <div style="flex:1;min-width:0;">
            <div style="font-weight:600;">${u.name}, ${u.age}</div>
            <div class="row gap2 muted" style="font-size:12px;">${ICONS.mappin(12)} ${u.island} · ${u.work}</div>
            <div style="margin-top:6px;"><span class="tagpill tag-green">${u.intent}</span></div>
          </div>
          ${u.unlocked
            ? `<span class="tagpill tag-green">${ICONS.check(11)} Chat open</span>`
            : `<span class="tagpill tag-muted">${ICONS.lock(11)} Locked</span>`}
        </button>
      `).join('')}
    </div>
  </div>`;
}
function openProfile(id){ state.activeProfileId = id; render(); }
function closeProfile(){ state.activeProfileId = null; render(); }

function renderProfileSheet(id){
  const u = USERS.find(x=>x.id===id);
  const canUnlock = state.me.tokenBalance >= 30;
  return `<div class="modal-backdrop" onclick="if(event.target===this) closeProfile()">
    <div class="modal-sheet">
      <div class="row" style="justify-content:flex-end;"><button onclick="closeProfile()" style="background:none;border:none;cursor:pointer;">${ICONS.x(20,'var(--muted)')}</button></div>
      <div class="col" style="align-items:center;margin-bottom:16px;">
        ${avatarHTML(u.name,u.color,84)}
        <div class="serif" style="font-size:20px;margin-top:12px;">${u.name}, ${u.age}</div>
        <div class="row gap2 muted" style="font-size:13px;">${ICONS.mappin(13)} ${u.island}</div>
        <div class="row gap2" style="margin-top:10px;">
          <span class="tagpill tag-red">${u.intent}</span>
          <span class="tagpill tag-muted">${u.status}</span>
        </div>
      </div>
      <div class="label">About</div>
      <p style="font-size:14px;margin:0 0 12px;">${u.bio}</p>
      <div class="row gap2 muted" style="font-size:13px;margin-bottom:20px;">${ICONS.briefcase(14)} ${u.work}</div>
      <div class="label">Lifestyle</div>
      <div class="col gap2" style="margin-bottom:24px;">
        ${LIFESTYLE_FIELDS.map(f=>`
          <div class="row between" style="padding:10px 12px;border-radius:12px;background:var(--surface);">
            <span class="muted" style="font-size:13px;">${f.label}</span>
            <span style="font-size:13px;">${u.lifestyle[f.key]}</span>
          </div>
        `).join('')}
      </div>
      ${u.unlocked
        ? `<button class="btn" onclick="messageUser(${u.id})">Message ${u.name}</button>`
        : canUnlock
          ? `<button class="btn" onclick="unlockChat(${u.id})">Unlock chat · 30 tokens</button>`
          : `<div class="row gap2" style="color:var(--danger);font-size:13px;margin-bottom:10px;">${ICONS.alert(14)} Not enough tokens</div>
             <button class="btn btn-ghost" onclick="goTopUp()">Top up wallet</button>`}
    </div>
  </div>`;
}
function unlockChat(id){
  if(state.me.tokenBalance < 30) return;
  state.me.tokenBalance -= 30;
  const u = USERS.find(x=>x.id===id);
  u.unlocked = true;
  render();
}
function goTopUp(){
  state.activeProfileId = null;
  state.tab = "wallet";
  state.checkout.open = true;
  render();
}
function messageUser(id){
  state.activeProfileId = null;
  state.activeChatId = id;
  render();
}

/* ---------------------------------------------------------------- chats tab */
function renderChats(){
  const unlocked = USERS.filter(u=>u.unlocked);
  return `<div class="screen with-nav">
    <div class="row between"><h1 class="title">Chats</h1>${logoSVG(28)}</div>
    ${unlocked.length===0 ? `<p class="muted" style="font-size:14px;margin-top:16px;">Unlock a chat from Discover to start talking.</p>` : ''}
    <div class="col gap2" style="margin-top:16px;">
      ${unlocked.map(u=>`
        <button class="card row gap3" style="width:100%;text-align:left;cursor:pointer;" onclick="openChat(${u.id})">
          ${avatarHTML(u.name,u.color,44)}
          <div style="flex:1;min-width:0;">
            <div style="font-weight:600;">${u.name}</div>
            <div class="muted" style="font-size:12px;">Tap to continue the conversation</div>
          </div>
        </button>
      `).join('')}
    </div>
  </div>`;
}
function openChat(id){ state.activeChatId = id; render(); }
function closeChat(){ state.activeChatId = null; render(); }

/* ---------------------------------------------------------------- chat thread */
let chatAgree = {}; // { [userId]: {me:bool, them:bool} }
function renderChatThread(id){
  const u = USERS.find(x=>x.id===id);
  chatAgree[id] = chatAgree[id] || {me:false, them:false};
  const a = chatAgree[id];
  return `<div class="chat-screen">
    <div class="row gap3" style="padding:20px 16px 12px;">
      <button onclick="closeChat()" style="background:none;border:none;cursor:pointer;">${ICONS.chevron(20,'var(--muted)')}</button>
      ${avatarHTML(u.name,u.color,36)}
      <span style="font-weight:600;">${u.name}</span>
    </div>
    <div class="chat-messages" id="chat-messages">
      ${u.messages.map(m=>`<div class="bubble ${m.from==='me'?'me':'them'}">${m.text}</div>`).join('')}
    </div>
    <div class="card" style="margin:0 16px 12px;">
      <div class="label">Share contact on WhatsApp</div>
      <p class="muted" style="font-size:12px;margin:0 0 12px;">Both of you need to agree before numbers are shared.</p>
      <div class="col gap2" style="margin-bottom:10px;">
        <button class="row between" style="width:100%;padding:8px 12px;border-radius:12px;background:var(--surfaceAlt);border:none;cursor:pointer;color:var(--text);" onclick="toggleMeAgree(${u.id})">
          <span>You</span>
          ${a.me ? ICONS.check(16,'var(--greenLight)') : `<span class="muted" style="font-size:12px;">Tap to agree</span>`}
        </button>
        <div class="row between" style="padding:8px 12px;border-radius:12px;background:var(--surfaceAlt);">
          <span>${u.name}</span>
          ${a.them ? ICONS.check(16,'var(--greenLight)') : `<span class="muted" style="font-size:12px;">Waiting…</span>`}
        </div>
      </div>
      ${!a.them ? `<button onclick="simulateThemAgree(${u.id})" style="background:none;border:none;color:var(--muted);font-size:12px;text-decoration:underline;cursor:pointer;padding:0;">(Demo only — simulate ${u.name} agreeing)</button>` : ''}
      ${a.me && a.them ? `<a class="btn-link row gap2 center" href="https://wa.me/9601234567" style="margin-top:12px;background:var(--green);color:var(--text);padding:12px;border-radius:12px;font-weight:600;font-size:14px;">${ICONS.phone(15,'var(--text)')} Open WhatsApp</a>` : ''}
    </div>
    <div class="chat-input-row">
      <input class="field" style="margin:0;" id="chat-draft" placeholder="Message" onkeydown="if(event.key==='Enter') sendMessage(${u.id})">
      <button class="icon-btn" onclick="sendMessage(${u.id})">${ICONS.send(18,'var(--text)')}</button>
    </div>
  </div>`;
}
function toggleMeAgree(id){
  chatAgree[id].me = !chatAgree[id].me;
  render();
}
function simulateThemAgree(id){
  chatAgree[id].them = true;
  render();
}
function sendMessage(id){
  const input = document.getElementById('chat-draft');
  const text = input.value.trim();
  if(!text) return;
  const u = USERS.find(x=>x.id===id);
  u.messages.push({from:"me", text});
  const msgs = document.getElementById('chat-messages');
  const bubble = document.createElement('div');
  bubble.className = 'bubble me';
  bubble.textContent = text;
  msgs.appendChild(bubble);
  msgs.scrollTop = msgs.scrollHeight;
  input.value = '';
  input.focus();
}

/* ---------------------------------------------------------------- wallet */
function renderWallet(){
  const me = state.me;
  return `<div class="screen with-nav">
    <div class="row between"><h1 class="title">Wallet</h1>${logoSVG(28)}</div>
    <div class="card" style="margin:16px 0;">
      <div class="label">Token balance</div>
      <div class="mono" style="color:var(--red);font-size:32px;">${me.tokenBalance}</div>
      <div class="muted" style="font-size:12px;margin-top:4px;">Unlocking a chat costs 30 tokens</div>
    </div>
    <div class="card" style="margin-bottom:20px;">
      <div class="label">Subscription</div>
      <div>${me.subscription==='none' ? 'No active plan' : me.subscription}</div>
    </div>
    <button class="btn" onclick="state.checkout.open=true;render()">Top up wallet</button>
  </div>`;
}

/* ---------------------------------------------------------------- checkout */
function copyFieldHTML(value, mono=true){
  return `<button class="row between" style="width:100%;padding:12px 14px;border-radius:12px;background:var(--surfaceAlt);border:1px solid var(--line);cursor:pointer;color:var(--text);margin-bottom:8px;" onclick="copyField('${value}', this)">
    <span class="${mono?'mono':''}">${value}</span>
    <span class="copy-icon">${ICONS.copy(18,'var(--muted)')}</span>
  </button>`;
}
function renderCheckout(){
  const co = state.checkout;
  if(co.step==="submitted"){
    return `<div class="screen with-nav col" style="align-items:center;text-align:center;">
      <div style="width:56px;height:56px;border-radius:999px;background:var(--surfaceAlt);border:1px solid var(--greenLight);display:flex;align-items:center;justify-content:center;margin:24px 0 16px;">${ICONS.clock(24,'var(--greenLight)')}</div>
      <div class="serif" style="font-size:22px;">Pending review</div>
      <p class="muted" style="font-size:14px;margin:8px 0 4px;">Reference <span class="mono" style="color:var(--text);">${co.ref}</span></p>
      <p class="muted" style="font-size:14px;max-width:260px;margin-bottom:24px;">We'll credit your ${co.plan.tokens?'tokens':'subscription'} once the transfer is verified — usually within 24 hours.</p>
      <button class="btn btn-ghost" style="max-width:200px;" onclick="state.checkout={open:false,step:'select',tab:'tokens',plan:null,ref:''};render()">Back to wallet</button>
    </div>`;
  }
  if(co.step==="pay"){
    return `<div class="screen with-nav">
      <div class="row gap2" style="margin-bottom:20px;">
        <button onclick="co_back()" style="background:none;border:none;cursor:pointer;">${ICONS.chevron(20,'var(--muted)')}</button>
        <span style="font-weight:600;">Transfer ${co.plan.mvr} MVR</span>
      </div>
      <div class="card" style="margin-bottom:16px;">
        <div class="label">Send to</div>
        ${copyFieldHTML(BANK.bankName,false)}
        ${copyFieldHTML(BANK.accountName,false)}
        ${copyFieldHTML(BANK.accountNumber,true)}
      </div>
      <div style="border:1px dashed var(--red);background:var(--surfaceAlt);border-radius:18px;margin-bottom:20px;padding:14px;">
        <div class="label">Put this in your transfer note</div>
        ${copyFieldHTML(co.ref,true)}
        <div class="muted" style="font-size:12px;">Without this code, verification takes longer.</div>
      </div>
      <div class="card" style="margin-bottom:12px;">
        <div class="label">BML transaction ID</div>
        <input id="co-txid" class="field" placeholder="e.g. TX2026061234567">
        <div class="label">Or upload a screenshot</div>
        <label style="display:flex;align-items:center;justify-content:center;gap:8px;padding:12px;border-radius:10px;background:var(--surfaceAlt);border:1px dashed var(--line);color:var(--muted);font-size:14px;cursor:pointer;">
          ${ICONS.upload(16)} <span id="co-filename">Choose file</span>
          <input type="file" accept="image/*" style="display:none" onchange="document.getElementById('co-filename').textContent=this.files[0]?.name||'Choose file'">
        </label>
      </div>
      <div id="co-error" style="display:none;color:var(--danger);font-size:13px;margin-bottom:10px;"></div>
      <button class="btn" onclick="co_submit()">I've sent the transfer</button>
    </div>`;
  }
  const plans = co.tab==="tokens" ? TOKEN_PACKS : SUB_TIERS;
  return `<div class="screen with-nav">
    <div class="row gap2" style="margin-bottom:20px;">
      <button onclick="state.checkout.open=false;render()" style="background:none;border:none;cursor:pointer;">${ICONS.chevron(20,'var(--muted)')}</button>
      <span style="font-weight:600;">Top up</span>
    </div>
    <div class="row gap2" style="margin-bottom:16px;">
      <button class="btn ${co.tab==='tokens'?'':'btn-ghost'}" style="flex:1;" onclick="state.checkout.tab='tokens';render()">Tokens</button>
      <button class="btn ${co.tab==='sub'?'':'btn-ghost'}" style="flex:1;" onclick="state.checkout.tab='sub';render()">Unlimited</button>
    </div>
    <div class="col gap3">
      ${plans.map(p=>`
        <button class="card row between" style="width:100%;text-align:left;cursor:pointer;" onclick='co_choose("${p.id}")'>
          <div>
            <div style="font-weight:600;">${p.label}</div>
            <div class="muted" style="font-size:12px;">${p.tokens? p.tokens+' tokens' : p.desc}</div>
          </div>
          <div class="mono" style="color:var(--red);">${p.mvr} MVR${p.period?'/mo':''}</div>
        </button>
      `).join('')}
    </div>
  </div>`;
}
function co_choose(id){
  const plan = [...TOKEN_PACKS, ...SUB_TIERS].find(p=>p.id===id);
  state.checkout.plan = plan;
  state.checkout.ref = genRef();
  state.checkout.step = "pay";
  render();
}
function co_back(){ state.checkout.step="select"; render(); }
function co_submit(){
  const tx = (document.getElementById('co-txid')||{}).value || "";
  const fname = (document.getElementById('co-filename')||{}).textContent || "";
  if(!tx.trim() && fname==="Choose file"){
    const err = document.getElementById('co-error');
    err.style.display = "block";
    err.innerHTML = `${ICONS.alert(14)} Add a transaction ID or screenshot.`;
    return;
  }
  state.checkout.step = "submitted";
  render();
}

/* ---------------------------------------------------------------- bottom nav */
function renderNav(){
  const items = [
    {id:"discover", icon:"heart", label:"Discover"},
    {id:"chats", icon:"message", label:"Chats"},
    {id:"wallet", icon:"wallet", label:"Wallet"},
    {id:"profile", icon:"user", label:"Profile"},
  ];
  return `<div class="nav">
    ${items.map(it=>`
      <button class="${state.tab===it.id?'active':''}" onclick="setTab('${it.id}')">
        ${ICONS[it.icon](20, state.tab===it.id?'var(--red)':'var(--muted)')}
        <span>${it.label}</span>
      </button>
    `).join('')}
  </div>`;
}
function setTab(t){
  state.tab = t;
  state.checkout.open = false;
  render();
}

/* ---------------------------------------------------------------- init */
render();
</script>
</body>
</html>
